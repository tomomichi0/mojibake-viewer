<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>文字化けページビューア</title>
<style>
  :root{
    --ink:#2b2a26;
    --paper:#f6f3ea;
    --paper-dim:#ece7d8;
    --line:#c9c2ab;
    --accent:#8a6d3b;
    --accent-soft:#e4d7b8;
    --mono: 'SF Mono', ui-monospace, Menlo, Consolas, monospace;
    --serif: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system, 'Hiragino Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;
    flex-direction:column;
  }
  header{
    padding:16px 16px 14px;
    border-bottom:1px solid var(--line);
    flex-shrink:0;
    background:
      repeating-linear-gradient(135deg, transparent 0 8px, rgba(138,109,59,0.04) 8px 9px);
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.12em;
    color:var(--accent);
    text-transform:uppercase;
    margin-bottom:4px;
  }
  h1{
    font-family:var(--serif);
    font-size:19px;
    font-weight:600;
    margin:0 0 10px;
    letter-spacing:0.02em;
  }
  .urlrow{
    display:flex;
    gap:8px;
  }
  #urlInput{
    flex:1;
    min-width:0;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:4px;
    font-size:14px;
    background:#fffdf7;
    color:var(--ink);
    font-family:var(--mono);
  }
  #urlInput:focus{outline:none;border-color:var(--accent);}
  button{
    font-family:inherit;
    font-size:14px;
    padding:10px 16px;
    border-radius:4px;
    border:1px solid var(--ink);
    background:var(--ink);
    color:var(--paper);
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    white-space:nowrap;
    flex-shrink:0;
  }
  button:active{opacity:0.7;}
  button:disabled{opacity:0.4;}
  .controls{
    display:flex;
    gap:8px;
    margin-top:10px;
    flex-wrap:wrap;
    align-items:center;
  }
  .enc-chip{
    font-family:var(--mono);
    font-size:11px;
    padding:5px 10px;
    border-radius:20px;
    border:1px solid var(--line);
    background:transparent;
    color:#6b6555;
  }
  .enc-chip.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .status{
    font-family:var(--mono);
    font-size:11px;
    color:var(--accent);
    margin-top:8px;
    min-height:14px;
  }
  .status.error{color:#b3452c;}
  main{
    flex:1;
    min-height:0;
    display:flex;
    flex-direction:column;
  }
  #frame{
    flex:1;
    width:100%;
    border:none;
    background:#fff;
  }
  .empty-state{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:8px;
    color:#a39d87;
    padding:40px 20px;
    text-align:center;
  }
  .empty-state .big{
    font-family:var(--serif);
    font-size:15px;
    color:#8a8266;
  }
  .empty-state .small{
    font-family:var(--mono);
    font-size:11px;
    line-height:1.7;
  }
  .proxy-note{
    font-size:10px;
    font-family:var(--mono);
    color:#a39d87;
    padding:6px 16px;
    border-top:1px solid var(--line);
    background:var(--paper-dim);
    flex-shrink:0;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Mojibake Page Viewer</div>
  <h1>文字化けページビューア</h1>
  <div class="urlrow">
    <input type="url" id="urlInput" value="http://tomeci.s27.xrea.com/pwchk46/pwchk.php" placeholder="https://example.com/page.php" autocapitalize="off" autocorrect="off" spellcheck="false">
    <button id="goBtn">表示</button>
  </div>
  <div class="controls">
    <span style="font-family:var(--mono);font-size:11px;color:#8a8266;">文字コード：</span>
    <div id="encRow" style="display:flex;gap:6px;flex-wrap:wrap;">
      <button type="button" class="enc-chip active" data-enc="auto">自動</button>
      <button type="button" class="enc-chip" data-enc="shift-jis">Shift_JIS</button>
      <button type="button" class="enc-chip" data-enc="euc-jp">EUC-JP</button>
      <button type="button" class="enc-chip" data-enc="utf-8">UTF-8</button>
    </div>
  </div>
  <div class="status" id="status"></div>
</header>

<main>
  <div class="empty-state" id="emptyState">
    <div class="big">URLを入れて「表示」を押してね</div>
    <div class="small">裏側で取得 → 文字コード判定 → 組版して表示するよ<br>取得できない場合は下の別法を試してね</div>
  </div>
  <iframe id="frame" style="display:none;"></iframe>
</main>

<div class="proxy-note" id="proxyNote">通信経由でページを取得します（外部プロキシ利用）</div>

<script>
(function(){
  const urlInput = document.getElementById('urlInput');
  const goBtn = document.getElementById('goBtn');
  const status = document.getElementById('status');
  const frame = document.getElementById('frame');
  const emptyState = document.getElementById('emptyState');
  const encRow = document.getElementById('encRow');
  let currentEnc = 'auto';
  let lastDetectedEnc = 'euc-jp';

  encRow.addEventListener('click', (e)=>{
    const btn = e.target.closest('.enc-chip');
    if(!btn) return;
    [...encRow.children].forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    currentEnc = btn.dataset.enc;
  });

  const PROXIES = [
    (url) => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
    (url) => 'https://corsproxy.io/?url=' + encodeURIComponent(url),
    (url) => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
  ];

  function scoreJapanese(text){
    const jp = (text.match(/[\u3040-\u30ff\u4e00-\u9fff]/g) || []).length;
    const replacement = (text.match(/\uFFFD/g) || []).length;
    return jp - replacement * 5;
  }

  function decodeBytes(bytes, encoding){
    const decoder = new TextDecoder(encoding, {fatal:false});
    return decoder.decode(bytes);
  }

  function autoDecode(bytes){
    const candidates = ['shift-jis','euc-jp','utf-8'];
    let best = null, bestScore = -Infinity, bestEnc = '';
    for(const enc of candidates){
      try{
        const result = decodeBytes(bytes, enc);
        const s = scoreJapanese(result);
        if(s > bestScore){ bestScore = s; best = result; bestEnc = enc; }
      }catch(e){}
    }
    return {text: best, enc: bestEnc};
  }

  async function fetchViaProxies(url){
    let lastError = null;
    for(let i=0; i<PROXIES.length; i++){
      const proxyUrl = PROXIES[i](url);
      try{
        status.textContent = '取得中… (経路 ' + (i+1) + '/' + PROXIES.length + ')';
        const res = await fetch(proxyUrl, {cache:'no-store'});
        if(!res.ok) throw new Error('HTTP ' + res.status);
        const buf = await res.arrayBuffer();
        if(buf.byteLength === 0) throw new Error('空の応答');
        return new Uint8Array(buf);
      }catch(e){
        lastError = e;
        continue;
      }
    }
    throw lastError || new Error('全ての経路で失敗');
  }

  async function rewriteRelativeUrls(html, baseUrl){
    const baseTag = '<base href="' + baseUrl + '">';
    if(/<head[^>]*>/i.test(html)){
      html = html.replace(/<head[^>]*>/i, (m) => m + baseTag);
    }else{
      html = baseTag + html;
    }
    html = rewriteImageUrls(html, baseUrl);
    html = await inlineImages(html, baseUrl);
    return injectFormHandler(html, baseUrl);
  }

  function fetchWithTimeout(url, options, timeoutMs){
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    return fetch(url, {...options, signal: controller.signal}).finally(() => clearTimeout(timer));
  }

  async function imageToDataUri(absUrl){
    try{
      const res = await fetchWithTimeout(absUrl, {cache:'force-cache'}, 5000);
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const blob = await res.blob();
      return await new Promise((resolve, reject)=>{
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }catch(e){
      try{
        const proxyUrl = 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(absUrl);
        const res = await fetchWithTimeout(proxyUrl, {cache:'force-cache'}, 5000);
        if(!res.ok) throw new Error('HTTP ' + res.status);
        const blob = await res.blob();
        return await new Promise((resolve, reject)=>{
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      }catch(e2){
        return null;
      }
    }
  }

  async function inlineImages(html, baseUrl){
    const srcs = new Set();
    html.replace(/<img\b[^>]*\bsrc\s*=\s*["'](.*?)["']/gi, (m, src) => { srcs.add(src); return m; });

    if(srcs.size === 0) return html;

    const urlMap = new Map();
    const imagePromises = [...srcs].map(async (src) => {
      if(/^data:/i.test(src)) return;
      try{
        const abs = new URL(src, baseUrl).href;
        const dataUri = await imageToDataUri(abs);
        if(dataUri) urlMap.set(src, dataUri);
      }catch(e){}
    });

    await Promise.race([
      Promise.all(imagePromises),
      new Promise(resolve => setTimeout(resolve, 8000))
    ]);

    html = html.replace(/(<img\b[^>]*\bsrc\s*=\s*)(["'])(.*?)\2/gi, (match, prefix, quote, src) => {
      if(urlMap.has(src)){
        return prefix + quote + urlMap.get(src) + quote;
      }
      return match;
    });
    return html;
  }

  function rewriteImageUrls(html, baseUrl){
    html = html.replace(/(<img\b[^>]*\bsrc\s*=\s*)(["'])(.*?)\2/gi, (match, prefix, quote, src) => {
      if(/^data:/i.test(src)) return match;
      try{
        const abs = new URL(src, baseUrl).href;
        return prefix + quote + abs + quote;
      }catch(e){
        return match;
      }
    });
    html = html.replace(/<style[^>]*>([\s\S]*?)<\/style>/gi, (styleMatch, cssBody) => {
      const rewritten = cssBody.replace(/url\((['"]?)(.*?)\1\)/gi, (m, quote, src) => {
        if(/^data:/i.test(src)) return m;
        try{
          const abs = new URL(src, baseUrl).href;
          return 'url(' + quote + abs + quote + ')';
        }catch(e){
          return m;
        }
      });
      return styleMatch.replace(cssBody, rewritten);
    });
    return html;
  }

  function injectFormHandler(html, baseUrl){
    const script = `
<script>
(function(){
  function handleSubmit(form){
    var action = form.getAttribute('action') || '';
    var absoluteAction = new URL(action || location.href, '${baseUrl}').href;
    var method = (form.getAttribute('method') || 'GET').toUpperCase();
    var formData = new FormData(form);
    var payload = { type: 'mojibake-form-submit', action: absoluteAction, method: method, fields: [] };
    for (var pair of formData.entries()) { payload.fields.push([pair[0], pair[1]]); }
    parent.postMessage(payload, '*');
  }
  document.addEventListener('submit', function(e){
    e.preventDefault();
    handleSubmit(e.target);
  }, true);
  document.addEventListener('click', function(e){
    var el = e.target;
    if(el.tagName === 'INPUT' && (el.type === 'submit' || el.type === 'button' || el.type === 'image')){
      var form = el.closest('form');
      if(form){
        e.preventDefault();
        e.stopPropagation();
        handleSubmit(form);
      }
    }
  }, true);
  parent.postMessage({type:'mojibake-debug', msg:'スクリプト注入OK / form数=' + document.forms.length}, '*');
})();
<\/script>`;
    if(/<\/body>/i.test(html)){
      return html.replace(/<\/body>/i, script + '</body>');
    }
    return html + script;
  }

  let currentBlobUrl = null;
  function setFrameContent(html){
    if(currentBlobUrl){
      URL.revokeObjectURL(currentBlobUrl);
      currentBlobUrl = null;
    }
    const blob = new Blob([html], {type: 'text/html'});
    currentBlobUrl = URL.createObjectURL(blob);
    frame.src = currentBlobUrl;
  }

  async function go(){
    const rawUrl = urlInput.value.trim();
    if(!rawUrl){
      status.textContent = 'URLを入力してね';
      status.classList.add('error');
      return;
    }
    let url;
    try{
      url = new URL(rawUrl);
    }catch(e){
      status.textContent = 'URLの形式がおかしいかも';
      status.classList.add('error');
      return;
    }

    goBtn.disabled = true;
    status.classList.remove('error');
    status.textContent = '取得中…';

    try{
      const bytes = await fetchViaProxies(url.href);

      let html, usedEnc;
      if(currentEnc === 'auto'){
        const r = autoDecode(bytes);
        html = r.text;
        usedEnc = r.enc;
      }else{
        html = decodeBytes(bytes, currentEnc);
        usedEnc = currentEnc;
      }
      lastDetectedEnc = usedEnc;

      status.textContent = '画像を読み込み中…';
      html = await rewriteRelativeUrls(html, url.href);

      setFrameContent(html);
      frame.style.display = 'block';
      emptyState.style.display = 'none';
      status.textContent = '表示したよ（' + usedEnc + ' で解読）';
    }catch(e){
      status.textContent = '取得できなかった: ' + e.message + '　→ 下の別法を試してね';
      status.classList.add('error');
    }finally{
      goBtn.disabled = false;
    }
  }

  goBtn.addEventListener('click', go);
  urlInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') go();
  });

  function encodeToBytes(str, encoding){
    if(encoding === 'utf-8'){
      return new TextEncoder().encode(str);
    }
    return encodeNonUtf8(str, encoding);
  }

  const _encodeCache = {};
  function buildReverseMap(encoding){
    if(_encodeCache[encoding]) return _encodeCache[encoding];
    const map = new Map();
    const decoder = new TextDecoder(encoding);
    for(let b = 0x00; b <= 0xFF; b++){
      try{
        const s = decoder.decode(new Uint8Array([b]));
        if(s && s.charCodeAt(0) !== 0xFFFD) map.set(s, [b]);
      }catch(e){}
    }
    for(let b1 = 0x81; b1 <= 0xFC; b1++){
      for(let b2 = 0x40; b2 <= 0xFE; b2++){
        try{
          const s = decoder.decode(new Uint8Array([b1,b2]));
          if(s && s.length===1 && s.charCodeAt(0) !== 0xFFFD) map.set(s, [b1,b2]);
        }catch(e){}
      }
    }
    _encodeCache[encoding] = map;
    return map;
  }

  function encodeNonUtf8(str, encoding){
    const map = buildReverseMap(encoding);
    const out = [];
    for(const ch of str){
      if(map.has(ch)){
        out.push(...map.get(ch));
      }else{
        out.push(...new TextEncoder().encode(ch));
      }
    }
    return new Uint8Array(out);
  }

  function bytesToPercentEncoded(bytes){
    let out = '';
    for(const b of bytes){
      out += '%' + b.toString(16).padStart(2,'0').toUpperCase();
    }
    return out;
  }

  window.addEventListener('message', async (e)=>{
    const data = e.data;
    if(!data) return;

    if(data.type === 'mojibake-debug'){
      status.textContent = 'デバッグ: ' + data.msg;
      return;
    }
    if(data.type !== 'mojibake-form-submit') return;

    goBtn.disabled = true;
    status.classList.remove('error');
    status.textContent = 'フォーム送信中…';

    try{
      let targetUrl = data.action;
      let bytes = null;
      let lastErr = null;

      if(data.method === 'GET'){
        const u = new URL(targetUrl);
        data.fields.forEach(([k,v]) => u.searchParams.set(k, v));
        targetUrl = u.href;
        bytes = await fetchViaProxies(targetUrl);
      }else{
        const sendEnc = (currentEnc === 'auto') ? (lastDetectedEnc || 'utf-8') : currentEnc;
        const encodedPairs = data.fields.map(([k,v]) => {
          const kb = encodeToBytes(k, sendEnc);
          const vb = encodeToBytes(v, sendEnc);
          return bytesToPercentEncoded(kb) + '=' + bytesToPercentEncoded(vb);
        });
        const bodyStr = encodedPairs.join('&');

        const postProxies = [
          'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(targetUrl),
          'https://corsproxy.io/?url=' + encodeURIComponent(targetUrl),
        ];
        for(const proxyUrl of postProxies){
          try{
            status.textContent = 'フォーム送信中…(' + sendEnc + 'で送信)';
            const res = await fetch(proxyUrl, {
              method: 'POST',
              headers: {'Content-Type':'application/x-www-form-urlencoded'},
              body: bodyStr,
              cache: 'no-store'
            });
            if(!res.ok) throw new Error('HTTP ' + res.status);
            const buf = await res.arrayBuffer();
            if(buf.byteLength === 0) throw new Error('空の応答');
            bytes = new Uint8Array(buf);
            break;
          }catch(e){
            lastErr = e;
            continue;
          }
        }
        if(!bytes){
          try{
            status.textContent = 'POST失敗、GETで再試行…';
            const u = new URL(targetUrl);
            data.fields.forEach(([k,v]) => u.searchParams.set(k, v));
            bytes = await fetchViaProxies(u.href);
          }catch(e){
            lastErr = e;
          }
        }
      }

      if(!bytes) throw lastErr || new Error('送信に失敗したよ');

      let html, usedEnc;
      if(currentEnc === 'auto'){
        const r = autoDecode(bytes);
        html = r.text; usedEnc = r.enc;
      }else{
        html = decodeBytes(bytes, currentEnc);
        usedEnc = currentEnc;
      }

      status.textContent = '画像を読み込み中…';
      html = await rewriteRelativeUrls(html, targetUrl);

      const imgSrcsRaw = [...( decodeBytes(bytes, (currentEnc==='auto'?usedEnc:currentEnc)) ).matchAll(/<img\b[^>]*\bsrc\s*=\s*["'](.*?)["']/gi)].map(m=>m[1]);

      const imgInfo = imgSrcsRaw.length > 0 ? (' / 画像:' + imgSrcsRaw.slice(0,2).join(', ')) : ' / 画像タグなし';
      setFrameContent(html);
      frame.style.display = 'block';
      emptyState.style.display = 'none';
      status.textContent = '結果を表示したよ（' + usedEnc + ' で解読）' + imgInfo;
    }catch(err){
      status.textContent = 'フォーム送信できなかった: ' + err.message;
      status.classList.add('error');
    }finally{
      goBtn.disabled = false;
    }
  });
})();
</script>

</body>
</html>
